<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANK | Creative Portfolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

    <main class="hero-viewport">
        <section class="brand-layer">
            <h1 class="logo-main">WLF<br>FJR</h1>
            <div class="brand-sub">
                <p>Creative Portfolio<br>2026 HTML Website Template</p>
            </div>
        </section>

        <section class="stage">
            
            <div class="tilt-card main-feature" data-tilt data-tilt-max="6" data-tilt-glare="true" data-tilt-max-glare="0.3">
                <img src="img/breaking-wave.jpg"  
                     alt="Breaking Wave">
                <div class="overlay-text">Breaking Wave</div>
            </div>

            <div class="tilt-card f1" data-tilt data-tilt-max="15">
                <img src="img/victorian-1.jpg" alt="Gallery 1">
            </div>

            <div class="tilt-card f2" data-tilt data-tilt-max="20">
                <img src="img/smithy.jpg" alt="Gallery 2">
            </div>

            <div class="tilt-card f3" data-tilt data-tilt-max="12">
                <img src="img/forest.jpg" alt="Gallery 3">
            </div>
            
            <div class="tilt-card product-card" data-tilt data-tilt-perspective="1500">
                <img src="img/wall-lamp.jpg" alt="Featured Product">
                <div class="product-info">
                    <span>Wall Lamp</span>
                    <small>Branding</small>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
