<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLDNFJR | Creative Portfolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">
<div id="preloader">
    <div class="preloader-content">
        <div class="logo-loader">WLDNFJR</div>
        <div class="loader-bar">
            <div class="progress"></div>
        </div>
        <span class="loading-text">0%</span>
    </div>
</div>
<nav class="mt-5 brand-layer">
    <ul class="list-unstyled">
        <li class="mb-2"><a href="#gallery" class="nav-link-custom">Project Gallery</a></li>
        <li><a href="#contact" class="nav-link-custom">Contact Me</a></li>
    </ul>
</nav>

    <main class="hero-viewport">
        <section class="brand-layer">
            <h1 class="logo-main">WLDN<br>FJR</h1>
            <div class="brand-sub">
                <p>Creative Portfolio<br>2026 HTML Website Template</p>
            </div>
        </section>

        <section class="stage">
            
            <div class="tilt-card main-feature" data-tilt data-tilt-max="6" data-tilt-glare="true" data-tilt-max-glare="0.3">
                <img src="img/breaking-wave.jpg"  
                     alt="Breaking Wave">
                <div class="overlay-text">Breaking Wave</div>
            </div>

            <div class="tilt-card f1" data-tilt data-tilt-max="15">
                <img src="img/victorian-1.jpg" alt="Gallery 1">
            </div>

            <div class="tilt-card f2" data-tilt data-tilt-max="20">
                <img src="img/smithy.jpg" alt="Gallery 2">
            </div>

            <div class="tilt-card f3" data-tilt data-tilt-max="12">
                <img src="img/forest.jpg" alt="Gallery 3">
            </div>
            
            <div class="tilt-card product-card" data-tilt data-tilt-perspective="1500">
                <img src="img/wall-lamp.jpg" alt="Featured Product">
                <div class="product-info">
                    <span>Wall Lamp</span>
                    <small>Branding</small>
                </div>
            </div>
        </section>

<section id="gallery" class="container-fluid py-5 bg-black">
    <h2 class="display-4 fw-bold mb-5 text-center">Projects</h2>
    <div class="row g-4 px-md-5">
        <div class="col-md-6 col-lg-4">
            <div class="project-box" data-tilt>
                <img src="img/victorian-1.jpg" class="img-fluid" alt="Project">
                <div class="project-meta">Project Name</div>
            </div>
        </div>
        </div>
</section>

<section id="contact" class="container-fluid py-5 bg-black">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h2 class="display-4 fw-bold mb-4">Let's Talk</h2>
            <form class="contact-form">
                <input type="text" placeholder="Your Name" class="form-control mb-3">
                <input type="email" placeholder="Email Address" class="form-control mb-3">
                <textarea placeholder="Message" class="form-control mb-4" rows="5"></textarea>
                <button type="submit" class="btn btn-outline-light px-5 py-3">Send Message</button>
            </form>
        </div>
    </div>
</section>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
